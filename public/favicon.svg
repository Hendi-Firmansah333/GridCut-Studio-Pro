<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Smooth Dark Premium Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <g transform="translate(106, 106)">
    <!-- Column 1 -->
    <rect x="0" y="0" width="84" height="84" rx="24" fill="url(#grid-base)" />
    <rect x="0" y="108" width="84" height="84" rx="24" fill="url(#grid-base)" />
    <rect x="0" y="216" width="84" height="84" rx="24" fill="url(#grid-base)" />
    
    <!-- Column 2 -->
    <rect x="108" y="0" width="84" height="84" rx="24" fill="url(#grid-base)" />
    <rect x="108" y="108" width="84" height="84" rx="24" fill="url(#grid-base)" />
    <rect x="108" y="216" width="84" height="84" rx="24" fill="url(#grid-base)" />

    <!-- Column 3 -->
    <rect x="216" y="108" width="84" height="84" rx="24" fill="url(#grid-base)" />
    <rect x="216" y="216" width="84" height="84" rx="24" fill="url(#grid-base)" />

    <!-- Cut Lines (Scissors Path) -->
    <path d="M 204 -40 L 204 340" stroke="#38BDF8" stroke-opacity="0.8" stroke-width="8" stroke-dasharray="16 16" stroke-linecap="round" />
    <path d="M -40 96 L 200 96" stroke="#38BDF8" stroke-opacity="0.8" stroke-width="8" stroke-dasharray="16 16" stroke-linecap="round" />

    <!-- The popped out piece (rendered last to be on top of cut lines) -->
    <g transform="translate(230, -16) rotate(12)">
      <rect x="0" y="0" width="90" height="90" rx="26" fill="url(#accent-grad)" />
      <!-- Subtle inner glow on the popped piece -->
      <rect x="2" y="2" width="86" height="86" rx="24" stroke="white" stroke-opacity="0.4" stroke-width="4" />
    </g>
  </g>

  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F19" />
      <stop offset="1" stop-color="#1A2235" />
    </linearGradient>
    
    <!-- Default Grid Item Gradient -->
    <linearGradient id="grid-base" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#2A3449" />
      <stop offset="1" stop-color="#1E2638" />
    </linearGradient>
    
    <!-- Accent Gradient (Premium Blue) -->
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#38BDF8" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
  </defs>
</svg>